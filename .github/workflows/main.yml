name: Build APK

on:
  push:
    branches: [ main, master ]   # debug builds on every push
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.1)'
        required: true
        default: 'v1.0'
      release_notes:
        description: 'Additional release notes (optional)'
        required: false
        default: ''
      prerelease:
        description: 'Mark as pre-release?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# Allow GITHUB_TOKEN to create releases
permissions:
  contents: write

jobs:
  # ── Debug build — auto on every push to main ─────────────────────────────
  build_debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GPSLink-Output-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  # ── Release build — only when manually triggered ──────────────────────────
  build_release:
    name: Build & Publish Release APK
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" \
            | tr -d '\n\r ' \
            | base64 --decode > $RUNNER_TEMP/gpslink-output.keystore

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$RUNNER_TEMP/gpslink-output.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/GPSLink-Output-${{ github.event.inputs.version }}.apk

      - name: Upload Release APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: GPSLink-Output-release-${{ github.event.inputs.version }}
          path: app/build/outputs/apk/release/GPSLink-Output-${{ github.event.inputs.version }}.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: GPSLink-Output ${{ github.event.inputs.version }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          body: |
            ## GPSLink-Output ${{ github.event.inputs.version }}

            ${{ github.event.inputs.release_notes != '' && github.event.inputs.release_notes || '' }}

            ### Installation
            1. Download `GPSLink-Output-${{ github.event.inputs.version }}.apk` below
            2. Enable **Install unknown apps** on your device
            3. Go to **Developer Options → Mock Location App** → select GPSLink-Output
            4. Open the app and grant **Location** and **Bluetooth** permissions
            5. Pair your Bluetooth GNSS receiver and tap **Start**

            ### Requirements
            - Android 8.0+ (API 26)
            - Bluetooth-capable GNSS receiver
            - Location & Bluetooth permissions

            ### Permissions used
            - `ACCESS_FINE_LOCATION` / `ACCESS_COARSE_LOCATION` — GPS mock output
            - `BLUETOOTH_CONNECT` / `BLUETOOTH_SCAN` — receiver pairing
            - `FOREGROUND_SERVICE_LOCATION` — background GPS service
            - `RECEIVE_BOOT_COMPLETED` — auto-start on device reboot

            ---
            **Commit:** ${{ github.sha }}
            **Build:** #${{ github.run_number }}
          files: app/build/outputs/apk/release/GPSLink-Output-${{ github.event.inputs.version }}.apk
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
