name: Build & Publish APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.2.0'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── Cache Gradle dependencies ──────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build debug APK
        run: ./gradlew assembleDebug

      # ── Sign release APK (only on push to main/master) ────────────────────
      - name: Build release APK
        if: github.event_name == 'push'
        run: ./gradlew assembleRelease

      - name: Sign release APK
        if: github.event_name == 'push'
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      # ── Upload debug APK (always) ──────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GPSLink-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── Upload signed release APK (push only) ─────────────────────────────
      - name: Upload signed release APK
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: GPSLink-release-${{ github.run_number }}
          path: ${{ steps.sign_apk.outputs.signedReleaseFile }}
          retention-days: 30

      # ── Create GitHub Release & attach APK (push to main/master only) ─────
      - name: Get version name
        if: github.event_name == 'push'
        id: version
        run: |
          VERSION=$(./gradlew -q printVersionName 2>/dev/null || echo "1.0.${{ github.run_number }}")
          echo "name=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}-build${{ github.run_number }}
          name: GPSLink v${{ steps.version.outputs.name }} (Build ${{ github.run_number }})
          body: |
            ## 🚀 Automated Release

            **Branch:** `${{ github.ref_name }}`
            **Commit:** ${{ github.sha }}
            **Build:** #${{ github.run_number }}

            ### Changes
            ${{ github.event.head_commit.message }}
          files: ${{ steps.sign_apk.outputs.signedReleaseFile }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
